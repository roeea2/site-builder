<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>שגיאה בתשלום | מנוסייט</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Heebo', sans-serif;
      background: #0a0a0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 460px;
      width: 90%;
      text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 16px; color: #aaa; line-height: 1.6; }
    .btn {
      display: inline-block;
      margin-top: 32px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #4f7856, #6c9f6e);
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">❌</div>
    <h1>התשלום נכשל</h1>
    <p>לא הצלחנו לעבד את התשלום שלך. לא חויבת.<br><br>נסה שנית או צור קשר איתנו לעזרה.</p>
    <a href="https://restaurant-sites-six.vercel.app" class="btn">נסה שנית</a>
  </div>
</body>
</html>
