<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>שגיאה בתשלום | קאטסייט</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Heebo', sans-serif;
      background: #07090f; color: #edf0f8;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: rgba(34,169,197,0.05); border: 1px solid rgba(34,169,197,0.14);
      border-radius: 20px; padding: 48px 40px; max-width: 460px; width: 90%; text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 16px; color: #8893a8; line-height: 1.65; }
    .btn {
      display: inline-block; margin-top: 32px; padding: 14px 32px;
      background: #22a9c5; color: #07090f; border-radius: 12px;
      text-decoration: none; font-size: 15px; font-weight: 700; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">❌</div>
    <h1>התשלום נכשל</h1>
    <p>לא הצלחנו לעבד את התשלום שלך. לא חויבת.<br><br>נסה שנית או צור קשר איתנו לעזרה.</p>
    <a href="/" class="btn">נסה שנית</a>
  </div>
</body>
</html>
